name: 🐛 Bug report
description: Something broken in the dApp, the contracts, or the MetaMask Snap?
title: "bug: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Before filing, please check:
        - [Existing issues](https://github.com/ItsGoonBoyCrypto/INSdomains/issues) — someone may have already reported it
        - **For security vulnerabilities**: do NOT file a public issue. Use a [private security advisory](https://github.com/ItsGoonBoyCrypto/INSdomains/security/advisories/new) instead.

  - type: dropdown
    id: area
    attributes:
      label: Which area is affected?
      options:
        - MetaMask Snap (ins-snap-resolver)
        - dApp (insdomains.org website)
        - Smart contracts (INSRegistry / Marketplace / Resolver)
        - REST API (insdomains.org/api)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concrete description of the bug.
      placeholder: When I type `alice.igra` in MetaMask's send field, the snap returns…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the snap to resolve to…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include exact names / addresses / chain IDs.
      placeholder: |
        1. Install snap via snaps.metamask.io/snap/npm/ins-snap-resolver/
        2. Open MetaMask, switch to Ethereum Mainnet
        3. Click Send, type `…`
        4. Observe …
    validations:
      required: true

  - type: input
    id: snap-version
    attributes:
      label: Snap version (if applicable)
      description: From MetaMask → Settings → Snaps → INS - Igra Name Service
      placeholder: "0.1.0"

  - type: input
    id: browser
    attributes:
      label: Browser + MetaMask version
      placeholder: "Chrome 138 / MetaMask 12.x"

  - type: textarea
    id: console
    attributes:
      label: Browser console output (if any)
      description: Open DevTools → Console, paste any red errors.
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: This is not a security vulnerability (those go to private advisories)
          required: true
