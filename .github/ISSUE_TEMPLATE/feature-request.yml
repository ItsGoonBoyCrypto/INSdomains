name: ✨ Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: ["enhancement"]

body:
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - MetaMask Snap
        - dApp
        - Smart contracts
        - REST API
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's the user pain or missing capability?
      placeholder: As a wallet developer, I want to integrate INS resolution without bundling the snap because…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Include UX / API shape if you have it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't fit.

  - type: textarea
    id: context
    attributes:
      label: Additional context / links
      description: Related issues, prior art, screenshots, etc.
